name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22.13.1
      - name: Install
        working-directory: territory-wars
        run: npm install
      - name: Typecheck
        working-directory: territory-wars
        run: npm run typecheck
      - name: Test
        working-directory: territory-wars
        run: npm test
      - name: Build
        working-directory: territory-wars
        run: npm run build

